<section class="section-pad" style="background: var(--jd-bg);">
  <div class="container">
    <div class="section-title mb-4">
      <h2 class="fw-bold mb-2">Solutions</h2>
      <p class="text-muted mb-0">Choose a package or ask for a custom plan.</p>
    </div>

    <div class="row g-4">
      <div class="col-md-6 col-lg-4" *ngFor="let s of services">
        <div class="card-soft p-4 h-100">
          <div class="d-flex gap-3">
            <div class="icon-pill"><i class="bi {{s.icon}}"></i></div>
            <div>
              <h5 class="fw-semibold mb-1">{{s.title}}</h5>
              <p class="text-muted mb-0">{{s.desc}}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-soft p-4 mt-4">
      <div class="row g-3 align-items-center">
        <div class="col-lg-8">
          <h5 class="fw-semibold mb-1">Need a dedicated team?</h5>
          <div class="text-muted">We can work as an extended team for ongoing improvements.</div>
        </div>
        <div class="col-lg-4 text-lg-end">
          <a routerLink="/contact" class="btn btn-primary btn-lg px-4">Request Proposal</a>
        </div>
      </div>
    </div>
  </div>
</section>
