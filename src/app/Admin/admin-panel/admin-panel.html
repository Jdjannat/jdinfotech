<div class="admin-panel-container">
  <!-- Common Header -->
  <header class="admin-header">
    <div class="header-content">
      <h1 class="logo">Admin Dashboard</h1>
      <div class="header-right">
        <div class="user-info">
          <span class="user-icon">👤</span>
          <span class="user-name">{{ currentUser }}</span>
        </div>
        <button class="logout-btn" (click)="logout()">Sign Out</button>
      </div>
    </div>
  </header>

  <div class="admin-panel-body">
    <!-- Sidebar -->
    <aside class="admin-sidebar">

      <nav class="sidebar-nav">
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-button">
          <i class="bi bi-speedometer2 nav-icon"></i>
          <span class="nav-label">Dashboard</span>
        </a>
        <a routerLink="/admin/inquiry" routerLinkActive="active" class="nav-button">
          <i class="bi bi-speedometer2 nav-icon"></i>
          <span class="nav-label">Inquiry</span>
        </a>

        <a routerLink="/admin/portfolio" routerLinkActive="active" class="nav-button">
          <i class="bi bi-image nav-icon"></i>
          <span class="nav-label">Portfolio</span>
        </a>

        <a routerLink="/admin/services" routerLinkActive="active" class="nav-button">
          <i class="bi bi-gear nav-icon"></i>
          <span class="nav-label">Services</span>
        </a>

        <a routerLink="/admin/team" routerLinkActive="active" class="nav-button">
          <i class="bi bi-people nav-icon"></i>
          <span class="nav-label">Team</span>
        </a>

        <a routerLink="/admin/testimonials" routerLinkActive="active" class="nav-button">
          <i class="bi bi-star nav-icon"></i>
          <span class="nav-label">Testimonials</span>
        </a>

        <a routerLink="/admin/blog" routerLinkActive="active" class="nav-button">
          <i class="bi bi-pencil-square nav-icon"></i>
          <span class="nav-label">Blog</span>
        </a>

        <a routerLink="/admin/settings" routerLinkActive="active" class="nav-button">
          <i class="bi bi-chat-dots nav-icon"></i>
          <span class="nav-label">Settings</span>
        </a>
        <a routerLink="/admin/career" routerLinkActive="active" class="nav-button">
          <i class="bi bi-briefcase nav-icon"></i>
          <span class="nav-label">Career</span>
        </a>
      </nav>
    </aside>

    <!-- Content -->
    <div class="admin-content">

      <router-outlet></router-outlet>
    </div>
  </div>

</div>
