<div class="component-container">
  <div class="component-header">
    <h2>🖼️ Portfolio Management</h2>
    <button class="btn-primary" (click)="showForm = !showForm">
      {{ showForm ? 'Cancel' : '+ Add Portfolio Item' }}
    </button>
  </div>

  <!-- Form -->
  <form *ngIf="showForm" class="form-container">
    <input type="text" placeholder="Title" [(ngModel)]="formData.title" name="title" class="form-input" />
    <textarea placeholder="Description" [(ngModel)]="formData.description" name="description" class="form-input"></textarea>
    <input type="text" placeholder="Category" [(ngModel)]="formData.category" name="category" class="form-input" />
    <input type="text" placeholder="Image URL" [(ngModel)]="formData.imageUrl" name="imageUrl" class="form-input" />
    <input type="text" placeholder="Project Link" [(ngModel)]="formData.link" name="link" class="form-input" />
    <input type="text" placeholder="Technologies (comma separated)" name="technologies" class="form-input"
      (change)="onTechnologiesChange($any($event.target).value)" />
    <button type="button" class="btn-success" (click)="formData.id ? saveItem() : addItem()">
      {{ formData.id ? 'Update' : 'Add' }} Portfolio Item
    </button>
  </form>

  <!-- List -->
  <div class="content-grid">
    <div *ngFor="let item of portfolioItems" class="content-card">
      <img [src]="item.imageUrl" alt="{{ item.title }}" class="card-image" />
      <div class="card-content">
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
        <div class="card-meta">
          <span class="badge">{{ item.category }}</span>
        </div>
        <div class="card-actions">
          <button class="btn-edit" (click)="editItem(item)">Edit</button>
          <button class="btn-delete" (click)="deleteItem(item.id)">Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>
