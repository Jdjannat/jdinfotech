<div class="component-container">
  <div class="component-header">
    <h2>👥 Team Members Management</h2>
    <button class="btn-primary" (click)="showForm = !showForm">
      {{ showForm ? 'Cancel' : '+ Add Team Member' }}
    </button>
  </div>

  <!-- Form -->
  <form *ngIf="showForm" class="form-container">
    <input type="text" placeholder="Full Name" [(ngModel)]="formData.name" name="name" class="form-input" />
    <input type="text" placeholder="Position" [(ngModel)]="formData.position" name="position" class="form-input" />
    <textarea placeholder="Bio" [(ngModel)]="formData.bio" name="bio" class="form-input"></textarea>
    <input type="email" placeholder="Email" [(ngModel)]="formData.email" name="email" class="form-input" />
    <input type="text" placeholder="Image URL" [(ngModel)]="formData.imageUrl" name="imageUrl" class="form-input" />
    <button type="button" class="btn-success" (click)="formData.id ? saveMember() : addMember()">
      {{ formData.id ? 'Update' : 'Add' }} Team Member
    </button>
  </form>

  <!-- List -->
  <div class="content-grid">
    <div *ngFor="let member of teamMembers" class="content-card team-card">
      <img [src]="member.imageUrl" alt="{{ member.name }}" class="card-image" />
      <h3>{{ member.name }}</h3>
      <p class="position">{{ member.position }}</p>
      <p>{{ member.bio }}</p>
      <div class="card-actions">
        <button class="btn-edit" (click)="editMember(member)">Edit</button>
        <button class="btn-delete" (click)="deleteMember(member.id)">Delete</button>
      </div>
    </div>
  </div>
</div>
