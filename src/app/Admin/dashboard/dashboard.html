<!-- Dashboard Overview - Only shown when activePanel is 'dashboard' -->
<div *ngIf="activePanel === 'dashboard'">
  <!-- Welcome Section -->
  <section class="welcome-section">
    <div class="welcome-card">
      <h2>Welcome to Dashboard! <i class="bi bi-stars" aria-hidden="true"></i></h2>
      <p class="welcome-text">You have successfully logged in</p>
      <div class="datetime-info">
        <p class="date">{{ currentDate }}</p>
        <p class="time">{{ currentTime }}</p>
      </div>
    </div>
  </section>

  <!-- Stats Section -->
  <section class="stats-section">
    <h3>Quick Stats</h3>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-bar-chart-line-fill" aria-hidden="true"></i></div>
        <h4>Total Projects</h4>
        <p class="stat-number">12</p>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-people-fill" aria-hidden="true"></i></div>
        <h4>Active Users</h4>
        <p class="stat-number">45</p>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-check-circle-fill" aria-hidden="true"></i></div>
        <h4>Completed Tasks</h4>
        <p class="stat-number">128</p>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-exclamation-triangle-fill" aria-hidden="true"></i></div>
        <h4>Pending Reviews</h4>
        <p class="stat-number">8</p>
      </div>
    </div>
  </section>
</div>
